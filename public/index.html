<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; }
    #todo-form { display: flex; margin-bottom: 20px; }
    #todo-input { flex: 1; padding: 10px; }
    #add-btn { padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    #todo-list { list-style: none; padding: 0; }
    .todo-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; }
    .todo-text { flex: 1; }
    .completed { text-decoration: line-through; color: #888; }
    .delete-btn { background: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <form id="todo-form">
    <input type="text" id="todo-input" placeholder="Add a new todo" required>
    <button type="submit" id="add-btn">Add</button>
  </form>
  <ul id="todo-list"></ul>

  <script>
    const todoForm = document.getElementById('todo-form');
    const todoInput = document.getElementById('todo-input');
    const todoList = document.getElementById('todo-list');

    // Load todos
    async function loadTodos() {
      const response = await fetch('/api/todos');
      const todos = await response.json();
      renderTodos(todos);
    }

    // Render todos
    function renderTodos(todos) {
      todoList.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.innerHTML = `
          <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id}, this.checked)">
          <span class="todo-text ${todo.completed ? 'completed' : ''}">${todo.text}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
        `;
        todoList.appendChild(li);
      });
    }

    // Add todo
    todoForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = todoInput.value.trim();
      if (text) {
        await fetch('/api/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        todoInput.value = '';
        loadTodos();
      }
    });

    // Toggle todo
    async function toggleTodo(id, completed) {
      await fetch(`/api/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    // Delete todo
    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, {
        method: 'DELETE'
      });
      loadTodos();
    }

    // Initial load
    loadTodos();
  </script>
</body>
</html>
